<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>F1 2026 Season Predictor · AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--panel:rgba(10,10,20,0.78);--red:#e8002d;--red-dim:rgba(232,0,45,0.12);
  --cyan:#00d4ff;--white:#ffffff;--muted:#55556a;--border:rgba(255,255,255,0.07);
  --hdr:56px;--pill:44px;--inp:72px;--side:260px;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--white);}
#three-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;}

/* ── API KEY MODAL ── */
#api-modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);}
.modal-box{background:rgba(12,12,24,0.97);border:1px solid rgba(232,0,45,0.45);border-radius:18px;padding:44px 52px;width:min(500px,92vw);text-align:center;box-shadow:0 0 80px rgba(232,0,45,0.18),0 0 160px rgba(232,0,45,0.07);}
.modal-icon{font-size:52px;margin-bottom:18px;line-height:1;}
.modal-title{font-family:'Orbitron',sans-serif;font-size:20px;font-weight:900;letter-spacing:3px;color:var(--white);margin-bottom:10px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:30px;line-height:1.6;}
.api-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:9px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;padding:13px 16px;outline:none;transition:border-color .2s;margin-bottom:14px;}
.api-input:focus{border-color:rgba(232,0,45,0.6);}
.api-input.invalid{border-color:var(--red);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn-primary{width:100%;background:var(--red);color:var(--white);font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2.5px;border:none;border-radius:9px;padding:15px;cursor:pointer;transition:opacity .2s,transform .1s;}
.btn-primary:hover{opacity:.87;}
.btn-primary:active{transform:scale(.98);}
.modal-note{font-size:11px;color:var(--muted);margin-top:18px;line-height:1.5;}
.modal-link{display:inline-block;font-size:12px;color:var(--cyan);text-decoration:none;margin-top:10px;}
.modal-link:hover{text-decoration:underline;}

/* ── APP SHELL ── */
#app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;}

/* ── HEADER ── */
#topbar{height:var(--hdr);display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:var(--panel);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-logo{font-size:22px;}
.topbar-title{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:2.5px;color:var(--white);}
.topbar-right{display:flex;align-items:center;gap:10px;position:relative;}
.live-badge{font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--cyan);animation:pulse-cyan 2.2s ease-in-out infinite;}
@keyframes pulse-cyan{0%,100%{opacity:1;text-shadow:0 0 10px var(--cyan);}50%{opacity:.45;text-shadow:none;}}
.btn-outline{background:transparent;border:1px solid var(--red);color:var(--red);font-family:'Orbitron',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;padding:7px 14px;border-radius:6px;cursor:pointer;transition:background .2s,color .2s;}
.btn-outline:hover{background:var(--red);color:var(--white);}

/* ── PILL BAR (track selector) ── */
#pill-wrap{height:var(--pill);flex-shrink:0;position:relative;background:rgba(8,8,18,0.88);border-bottom:1px solid var(--border);backdrop-filter:blur(16px);overflow:hidden;}
#pill-wrap::before,#pill-wrap::after{content:'';position:absolute;top:0;bottom:0;width:36px;z-index:2;pointer-events:none;}
#pill-wrap::before{left:0;background:linear-gradient(to right,rgba(8,8,18,0.95),transparent);}
#pill-wrap::after{right:0;background:linear-gradient(to left,rgba(8,8,18,0.95),transparent);}
#pill-bar{display:flex;align-items:center;gap:8px;padding:0 18px;height:100%;overflow-x:auto;scroll-behavior:smooth;scrollbar-width:none;}
#pill-bar::-webkit-scrollbar{display:none;}
.track-pill{flex-shrink:0;cursor:pointer;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:10px;color:rgba(255,255,255,0.65);font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:0.8px;white-space:nowrap;transition:border-color .2s,color .2s,box-shadow .2s;}
.track-pill:hover{color:var(--white);border-color:rgba(232,0,45,0.5);}
.track-pill.active{border-color:var(--red);color:var(--white);box-shadow:0 0 12px rgba(232,0,45,0.35);background:var(--red-dim);}
.pill-flag{font-size:12px;margin-right:3px;}
.pill-round{font-size:7.5px;color:var(--red);opacity:.8;margin-left:4px;}

/* ── LAYOUT ── */
#layout{flex:1;display:flex;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:var(--side);flex-shrink:0;background:var(--panel);border-right:1px solid var(--border);backdrop-filter:blur(20px);overflow-y:auto;overflow-x:hidden;}
#sidebar::-webkit-scrollbar{width:3px;}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px;}
.sidebar-section{padding:14px 0;}
.sidebar-section+.sidebar-section{border-top:1px solid var(--border);}
.sidebar-hdr{font-family:'Orbitron',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:2px;color:var(--muted);padding:0 16px 10px;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:7px 16px;cursor:pointer;transition:background .15s;font-size:12px;color:rgba(255,255,255,0.72);line-height:1.35;}
.sidebar-item:hover{background:rgba(255,255,255,0.04);color:var(--white);}
.sidebar-item.active{background:var(--red-dim);color:var(--white);border-right:2px solid var(--red);}
.team-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.race-code{font-family:'Orbitron',sans-serif;font-size:8.5px;color:var(--muted);width:24px;flex-shrink:0;}
.q-num{font-family:'Orbitron',sans-serif;font-size:8.5px;font-weight:700;color:var(--red);width:20px;flex-shrink:0;}

/* ── CHAT AREA ── */
#chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:18px;}
#messages::-webkit-scrollbar{width:3px;}
#messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.09);border-radius:2px;}
.welcome{position:relative;align-self:center;background:rgba(12,12,26,0.7);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:24px 32px;text-align:center;max-width:540px;margin:auto;}
.welcome h2{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--red);margin-bottom:10px;}
.welcome p{font-size:13px;color:rgba(255,255,255,0.58);line-height:1.65;}
.welcome strong{color:rgba(255,255,255,0.85);}
.welcome-close{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:var(--white);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;padding:0;line-height:1;}
.welcome-close:hover{background:rgba(255,255,255,0.22);}
.msg-wrap{display:flex;flex-direction:column;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.ai{align-items:flex-start;}
.msg-label{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;margin-bottom:5px;color:var(--muted);}
.msg-label.ai{color:rgba(0,212,255,0.65);}
.msg-bubble{max-width:78%;font-size:13.5px;line-height:1.68;white-space:pre-wrap;word-break:break-word;}
.msg-bubble.user{background:rgba(90,8,18,0.65);border:1px solid rgba(232,0,45,0.28);border-radius:16px 16px 4px 16px;padding:12px 16px;color:rgba(255,255,255,0.9);max-width:68%;}
.msg-bubble.ai{background:rgba(12,12,28,0.85);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:4px 16px 16px 16px;padding:14px 18px;color:rgba(255,255,255,0.87);box-shadow:0 0 24px rgba(0,212,255,0.05);max-width:88%;}
.msg-bubble.ai.streaming::after{content:'▋';display:inline;color:var(--cyan);animation:blink .75s step-end infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── INPUT BAR ── */
#input-bar{height:var(--inp);display:flex;align-items:center;gap:12px;padding:0 20px;background:var(--panel);border-top:1px solid var(--border);backdrop-filter:blur(20px);flex-shrink:0;}
#chat-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;padding:14px 18px;outline:none;transition:border-color .2s;}
#chat-input:focus{border-color:rgba(232,0,45,0.45);}
#chat-input::placeholder{color:var(--muted);}
#chat-input:disabled{opacity:.45;}
.btn-ask{background:var(--red);color:var(--white);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;border:none;border-radius:10px;padding:14px 22px;cursor:pointer;transition:opacity .2s;white-space:nowrap;flex-shrink:0;}
.btn-ask:hover:not(:disabled){opacity:.85;}
.btn-ask:disabled{opacity:.35;cursor:not-allowed;}

/* ── CAMERA BUTTONS (fixed overlay) ── */
#cam-btns{position:fixed;bottom:calc(var(--inp) + 14px);right:16px;z-index:2;display:none;flex-direction:column;gap:5px;}
#cam-btns.visible{display:flex;}
.cam-btn{background:rgba(10,10,22,0.86);border:1px solid rgba(255,255,255,0.12);border-radius:7px;color:rgba(255,255,255,0.55);font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;padding:7px 11px;cursor:pointer;backdrop-filter:blur(12px);transition:border-color .2s,color .2s,box-shadow .2s;min-width:60px;text-align:center;}
.cam-btn:hover{border-color:rgba(232,0,45,0.55);color:var(--white);}
.cam-btn.active{border-color:var(--red);color:var(--white);box-shadow:0 0 10px rgba(232,0,45,0.35);background:rgba(232,0,45,0.12);}

/* ── SETTINGS DROPDOWN ── */
#settings-dd{position:fixed;top:calc(var(--hdr) + 6px);right:16px;z-index:50;display:none;background:rgba(10,10,22,0.97);border:1px solid rgba(232,0,45,0.28);border-radius:12px;padding:18px 20px;min-width:260px;backdrop-filter:blur(20px);box-shadow:0 8px 40px rgba(0,0,0,0.55),0 0 40px rgba(232,0,45,0.07);}
#settings-dd.open{display:block;}
.settings-title{font-family:'Orbitron',sans-serif;font-size:8.5px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:12px;}
.settings-key{font-family:monospace;font-size:12px;color:rgba(255,255,255,0.7);background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:7px;padding:9px 12px;margin-bottom:12px;letter-spacing:1px;word-break:break-all;}
.settings-divider{height:1px;background:var(--border);margin:12px 0;}
.settings-action{display:block;width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:7px;color:rgba(255,255,255,0.72);font-family:'DM Sans',sans-serif;font-size:12px;padding:9px 12px;cursor:pointer;text-align:left;transition:background .15s,border-color .15s;margin-bottom:7px;}
.settings-action:hover{background:rgba(232,0,45,0.12);border-color:rgba(232,0,45,0.35);color:var(--white);}

/* ── RESPONSIVE ── */
@media(max-width:620px){
  :root{--side:0px;}
  #sidebar{display:none;}
  .topbar-title{font-size:10px;letter-spacing:1.5px;}
  .msg-bubble.ai{max-width:95%;}
}
</style>
</head>

</div>

//  STATE
// ═══════════════════════════════════════════════════════════════
let apiKey        = localStorage.getItem('f1_api_key') || '';
let conversation  = [];
let isStreaming   = false;
let activeItem    = null;

// Three.js module-level references (set by initThreeJS)
let _scene, _camera, _renderer, _clock, _stars, _sVel, _carGroup, _trailLine, _trailHistory;
const STAR_N = 2000;

// Track state
let _activeCurve   = null;
let _trackMeshes   = [];   // all meshes for current track (for disposal)
let _activeCircIdx = 0;
let _carT          = 0;
const CAR_SPEED    = 0.000068;

// Track fade state machine
let _fadeState     = 'stable'; // 'stable' | 'fadeout' | 'fadein'
let _fadeStart     = 0;
const FADE_DUR     = 0.4;
let _pendingIdx    = 0;

// Camera
let _cameraMode    = 'orbit';
let _orbitAngle    = 0;
const _camCurPos   = new THREE.Vector3(0, 38, 65);
const _camCurLook  = new THREE.Vector3(0, 0, 0);
const _camDesPos   = new THREE.Vector3(0, 38, 65);
const _camDesLook  = new THREE.Vector3(0, 0, 0);

// ═══════════════════════════════════════════════════════════════
//  TRACK MANAGER
// ═══════════════════════════════════════════════════════════════
function _buildVec3s(def) {
  return def.pts.map(([x, z], i) => {
    const y = (def.elev && def.elev[i] != null) ? def.elev[i] : 0;
    return new THREE.Vector3(x, y, z);
  });
}

function buildTrack(def) {
  const pts   = _buildVec3s(def);
  const curve = new THREE.CatmullRomCurve3(pts, true, 'catmullrom', 0.5);
  _activeCurve = curve;

  function addTube(r, col, op, side) {
    const geo = new THREE.TubeGeometry(curve, 300, r, 8, true);
    const mat = new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: op,
      blending: THREE.AdditiveBlending, depthWrite: false,
      side: side || THREE.FrontSide,
    });
    const m = new THREE.Mesh(geo, mat);
    _scene.add(m);
    _trackMeshes.push(m);
  }

  addTube(0.8, 0xe8002d, 0.06, THREE.BackSide); // glow halo
  addTube(0.3, 0xe8002d, 0.82);                  // main track
  addTube(0.05, 0xffffff, 0.3);                  // centre line

  // Start/finish plane
  const sfPos = curve.getPointAt(def.startT || 0);
  const sfTan = curve.getTangentAt(def.startT || 0);
  const sfGeo = new THREE.PlaneGeometry(1.4, 0.35);
  const sfMat = new THREE.MeshBasicMaterial({
    color: 0xffffff, transparent: true, opacity: 0.65,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const sfMesh = new THREE.Mesh(sfGeo, sfMat);
  sfMesh.position.copy(sfPos).setY(sfPos.y + 0.05);
  const angle = Math.atan2(sfTan.x, sfTan.z);
  sfMesh.rotation.x = -Math.PI / 2;
  sfMesh.rotation.z = -angle;
  _scene.add(sfMesh);
  _trackMeshes.push(sfMesh);

  // Corner labels as sprites
  if (def.corners) {
    def.corners.forEach(c => {
      const sprite = _makeTextSprite(c.label);
      const p = curve.getPointAt(c.t);
      sprite.position.set(p.x, p.y + 1.4, p.z);
      _scene.add(sprite);
      _trackMeshes.push(sprite);
    });
  }
}

function _makeTextSprite(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 64; canvas.height = 64;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 64, 64);
  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.beginPath();
  ctx.arc(32, 32, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.35)';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fillText(text, 32, 32);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(1.2, 1.2, 1);
  return sprite;
}

function disposeTrack() {
  for (const obj of _trackMeshes) {
    if (obj instanceof THREE.Sprite && obj.material && obj.material.map) obj.material.map.dispose();
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) obj.material.dispose();
    _scene.remove(obj);
  }
  _trackMeshes = [];
  _activeCurve = null;
}

function switchTrack(idx) {
  if (idx === _activeCircIdx && _trackMeshes.length > 0) return;
  _pendingIdx  = idx;
  _fadeState   = 'fadeout';
  _fadeStart   = _clock.getElapsedTime();
  // Update pill active state
  document.querySelectorAll('.track-pill').forEach((p, i) => p.classList.toggle('active', i === idx));
  const pill = document.querySelector('.track-pill.active');
  if (pill) pill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function _setTrackOpacity(alpha) {
  for (const obj of _trackMeshes) {
    if (obj.material && obj.material.transparent) {
      if (obj.material._baseOp === undefined) obj.material._baseOp = obj.material.opacity;
      obj.material.opacity = obj.material._baseOp * Math.max(0, Math.min(1, alpha));
    }
  }
}

function _updateTrackFade(elapsed) {
  if (_fadeState === 'stable') return;
  const alpha = Math.min((elapsed - _fadeStart) / FADE_DUR, 1);
  if (_fadeState === 'fadeout') {
    _setTrackOpacity(1 - alpha);
    if (alpha >= 1) {
      disposeTrack();
      _activeCircIdx = _pendingIdx;
      buildTrack(CIRCUITS[_activeCircIdx]);
      _carT = 0;
      _setTrackOpacity(0);
      _fadeState = 'fadein';
      _fadeStart = elapsed;
      // reset camera orbit to current circuit defaults
      const circ = CIRCUITS[_activeCircIdx];
      if (_cameraMode === 'top') {
        _camDesPos.set(circ.camTop[0], circ.camTop[1], circ.camTop[2]);
      }
    }
  } else if (_fadeState === 'fadein') {
    _setTrackOpacity(alpha);
    if (alpha >= 1) { _setTrackOpacity(1); _fadeState = 'stable'; }
  }
}

// ═══════════════════════════════════════════════════════════════
//  THREE.JS SCENE
// ═══════════════════════════════════════════════════════════════
function initThreeJS() {
  const canvas = document.getElementById('three-canvas');
  _renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  _renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  _renderer.setSize(window.innerWidth, window.innerHeight);

  _scene = new THREE.Scene();
  _scene.background = new THREE.Color(0x0a0a0f);

  _camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  _camera.position.set(0, 38, 65);

  _clock = new THREE.Clock();

  // Stars
  const sPos = new Float32Array(STAR_N * 3);
  _sVel = new Float32Array(STAR_N);
  for (let i = 0; i < STAR_N; i++) {
    sPos[i*3]   = (Math.random()-0.5)*260;
    sPos[i*3+1] = (Math.random()-0.5)*180;
    sPos[i*3+2] = (Math.random()-0.5)*260;
    _sVel[i] = 0.03 + Math.random()*0.04;
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  _stars = new THREE.Points(sGeo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.18, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.7,
  }));
  _scene.add(_stars);

  // F1 Car
  _carGroup = new THREE.Group();
  const redMat = new THREE.MeshBasicMaterial({ color: 0xd40026 });
  const dkMat  = new THREE.MeshBasicMaterial({ color: 0x180408 });
  const blkMat = new THREE.MeshBasicMaterial({ color: 0x111111 });
  _carGroup.add(new THREE.Mesh(new THREE.BoxGeometry(0.55,0.22,1.8), redMat));
  const cockpit = new THREE.Mesh(new THREE.BoxGeometry(0.27,0.26,0.5), dkMat);
  cockpit.position.set(0,0.21,0.1); _carGroup.add(cockpit);
  const nose = new THREE.Mesh(new THREE.BoxGeometry(0.21,0.13,0.55), redMat);
  nose.position.set(0,-0.02,1.1); _carGroup.add(nose);
  const fWing = new THREE.Mesh(new THREE.BoxGeometry(1.38,0.05,0.22), dkMat);
  fWing.position.set(0,-0.11,1.38); _carGroup.add(fWing);
  const rWing = new THREE.Mesh(new THREE.BoxGeometry(1.06,0.07,0.16), dkMat);
  rWing.position.set(0,0.52,-0.96); _carGroup.add(rWing);
  const rPost = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.48,0.07), dkMat);
  rPost.position.set(0,0.28,-0.96); _carGroup.add(rPost);
  const wGeo = new THREE.CylinderGeometry(0.21,0.21,0.17,10);
  [[-0.44,-0.04,0.68],[0.44,-0.04,0.68],[-0.44,-0.04,-0.68],[0.44,-0.04,-0.68]].forEach(([x,y,z]) => {
    const w = new THREE.Mesh(wGeo, blkMat); w.rotation.z = Math.PI/2; w.position.set(x,y,z); _carGroup.add(w);
  });
  _scene.add(_carGroup);

  // Trail
  _trailHistory = [];
  _trailLine = new THREE.Line(
    new THREE.BufferGeometry(),
    new THREE.LineBasicMaterial({ color:0x00d4ff, blending:THREE.AdditiveBlending, transparent:true, opacity:0.72 })
  );
  _scene.add(_trailLine);

  // Build initial track (Australia)
  buildTrack(CIRCUITS[0]);

  // Camera button wiring
  document.querySelectorAll('.cam-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      _cameraMode = btn.dataset.mode;
      document.querySelectorAll('.cam-btn').forEach(b => b.classList.toggle('active', b === btn));
      const circ = CIRCUITS[_activeCircIdx];
      if (_cameraMode === 'top') {
        _camDesPos.set(circ.camTop[0], circ.camTop[1], circ.camTop[2]);
        _camDesLook.set(0, 0, 0);
      } else if (_cameraMode === 'orbit') {
        _camDesLook.set(0, 0, 0);
      }
    });
  });

  window.addEventListener('resize', () => {
    _camera.aspect = window.innerWidth / window.innerHeight;
    _camera.updateProjectionMatrix();
    _renderer.setSize(window.innerWidth, window.innerHeight);
  });

  _animate();
}

function _animate() {
  requestAnimationFrame(_animate);
  const delta   = _clock.getDelta();
  const elapsed = _clock.getElapsedTime();
  const dtMs    = delta * 1000;

  // Car movement
  if (_activeCurve) {
    _carT = (_carT + CAR_SPEED * dtMs) % 1;
    const carPos = _activeCurve.getPointAt(_carT);
    const carTan = _activeCurve.getTangentAt(_carT);
    _carGroup.position.copy(carPos).setY(carPos.y + 0.42);
    const lookAt = carPos.clone().add(carTan); lookAt.y += 0.42;
    _carGroup.lookAt(lookAt);

    // Trail
    _trailHistory.push(_carGroup.position.clone());
    if (_trailHistory.length > 45) _trailHistory.shift();
    if (_trailHistory.length > 1) {
      const tGeo = new THREE.BufferGeometry().setFromPoints(_trailHistory);
      _trailLine.geometry.dispose();
      _trailLine.geometry = tGeo;
    }
  }

  // Track fade
  _updateTrackFade(elapsed);

  // Camera
  const LERP = 0.05;
  if (_cameraMode === 'orbit') {
    _orbitAngle += 0.0015;
    const circ = CIRCUITS[_activeCircIdx];
    const r = circ.camOrbit?.r || 65, h = circ.camOrbit?.h || 38;
    _camDesPos.set(Math.sin(_orbitAngle)*r, h, Math.cos(_orbitAngle)*r);
    _camDesLook.set(0, 0, 0);
    _camCurPos.lerp(_camDesPos, LERP * 3);
    _camCurLook.lerp(_camDesLook, LERP * 3);
  } else if (_cameraMode === 'top') {
    _camCurPos.lerp(_camDesPos, LERP);
    _camCurLook.lerp(_camDesLook, LERP);
  } else if (_cameraMode === 'chase' && _activeCurve) {
    const carPos = _carGroup.position.clone();
    const tangent = _activeCurve.getTangentAt(_carT).normalize();
    _camDesPos.copy(carPos).addScaledVector(tangent, -9).add(new THREE.Vector3(0, 3.5, 0));
    _camDesLook.copy(carPos).add(new THREE.Vector3(0, 0.8, 0));
    _camCurPos.lerp(_camDesPos, LERP * 2);
    _camCurLook.lerp(_camDesLook, LERP * 2);
  }
  _camera.position.copy(_camCurPos);
  _camera.lookAt(_camCurLook);

  // Stars drift upward
  const sp = _stars.geometry.attributes.position.array;
  for (let i = 0; i < STAR_N; i++) {
    sp[i*3+1] += _sVel[i] * delta;
    if (sp[i*3+1] > 90) sp[i*3+1] = -90;
  }
  _stars.geometry.attributes.position.needsUpdate = true;

  _renderer.render(_scene, _camera);
}

//  LIVE F1 DATA (Jolpica — drop-in Ergast replacement)
// ═══════════════════════════════════════════════════════════════
const JOLPICA = 'https://api.jolpi.ca/ergast/f1';

async function fetchLiveData() {
  try {
    const sig = typeof AbortSignal?.timeout === 'function' ? AbortSignal.timeout(5000) : undefined;
    const opts = sig ? { signal: sig } : {};
    const [last, drv, con, nxt] = await Promise.allSettled([
      fetch(`${JOLPICA}/current/last/results.json`, opts).then(r => r.json()),
      fetch(`${JOLPICA}/current/driverStandings.json`, opts).then(r => r.json()),
      fetch(`${JOLPICA}/current/constructorStandings.json`, opts).then(r => r.json()),
      fetch(`${JOLPICA}/current/next.json`, opts).then(r => r.json()),
    ]);
    const lines = ['LIVE 2026 SEASON DATA (fetched in real-time):'];
    if (last.status === 'fulfilled') try {
      const race = last.value.MRData.RaceTable.Races[0];
      const res  = race.Results;
      lines.push(`Last race: Rd${race.round} ${race.raceName} — Winner: ${res[0].Driver.familyName} (${res[0].Constructor.name})`);
      lines.push('Top 10: ' + res.slice(0,10).map((r,i)=>`${i+1}. ${r.Driver.familyName} (${r.Constructor.name}) ${r.Time?.time||r.status}`).join(', '));
    } catch(e){}
    if (drv.status === 'fulfilled') try {
      const s = drv.value.MRData.StandingsTable.StandingsLists[0].DriverStandings;
      lines.push('Drivers: ' + s.slice(0,5).map(d=>`${d.position}. ${d.Driver.familyName} ${d.points}pts`).join(', '));
    } catch(e){}
    if (con.status === 'fulfilled') try {
      const s = con.value.MRData.StandingsTable.StandingsLists[0].ConstructorStandings;
      lines.push('Constructors: ' + s.slice(0,5).map(c=>`${c.position}. ${c.Constructor.name} ${c.points}pts`).join(', '));
    } catch(e){}
    if (nxt.status === 'fulfilled') try {
      const r = nxt.value.MRData.RaceTable.Races[0];
      lines.push(`Next: ${r.raceName} on ${r.date} at ${r.Circuit.circuitName}, ${r.Circuit.Location.country}`);
    } catch(e){}
    return lines.length > 1 ? lines.join('\n') : '';
  } catch(e) { return ''; }
}

// ═══════════════════════════════════════════════════════════════
//  API STREAMING
// ═══════════════════════════════════════════════════════════════
async function sendMessage(text) {
  if (isStreaming || !text.trim()) return;
  isStreaming = true;
  const inputEl = document.getElementById('chat-input');
  const askBtn  = document.getElementById('ask-btn');
  inputEl.disabled = true; askBtn.disabled = true;
  appendUserBubble(text);
  conversation.push({ role: 'user', content: text });
  const aiBubble = appendAIBubble();
  try {
    const liveData = await fetchLiveData();
    const systemWithLive = liveData ? liveData + '\n\n' + SYSTEM_PROMPT : SYSTEM_PROMPT;
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'content-type': 'application/json',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        stream: true,
        system: systemWithLive,
        messages: conversation,
      }),
    });
    if (!response.ok) {
      let errMsg = `API error ${response.status}`;
      try { const b = await response.json(); errMsg = b.error?.message || errMsg; } catch(e){}
      aiBubble.classList.remove('streaming');
      aiBubble.textContent = `⚠ ${errMsg}`;
      if (response.status === 401) {
        aiBubble.textContent += '\n\nInvalid API key. Reloading in 2s...';
        setTimeout(() => { localStorage.removeItem('f1_api_key'); location.reload(); }, 2000);
      }
      return;
    }
    const reader  = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '', fullResponse = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const events = buffer.split('\n\n');
      buffer = events.pop();
      for (const event of events) {
        let dataLine = null;
        for (const line of event.split('\n')) { if (line.startsWith('data: ')) dataLine = line.slice(6).trim(); }
        if (!dataLine || dataLine === '[DONE]') continue;
        try {
          const parsed = JSON.parse(dataLine);
          if (parsed.type === 'error') throw new Error(parsed.error?.message || 'Stream error');
          if (parsed.type === 'content_block_delta' && parsed.delta?.type === 'text_delta') {
            fullResponse += parsed.delta.text;
            aiBubble.textContent += parsed.delta.text;
            scrollBottom();
          }
        } catch(e) { if (e.message !== 'Stream error') { /* ignore JSON parse noise */ } else throw e; }
      }
    }
    aiBubble.classList.remove('streaming');
    conversation.push({ role: 'assistant', content: fullResponse });
  } catch(err) {
    aiBubble.classList.remove('streaming');
    aiBubble.textContent = `⚠ ${err.message}`;
  } finally {
    isStreaming = false;
    inputEl.disabled = false; askBtn.disabled = false;
    inputEl.focus();
  }
}

// ═══════════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════════
function maskKey(k) {
  if (!k || k.length < 8) return '(none)';
  return k.slice(0,7) + '••••••••••••••' + k.slice(-6);
}

document.getElementById('settings-btn').addEventListener('click', e => {
  e.stopPropagation();
  const dd = document.getElementById('settings-dd');
  document.getElementById('key-display').textContent = maskKey(apiKey);
  dd.classList.toggle('open');
});
document.addEventListener('click', e => {
  const dd = document.getElementById('settings-dd');
  const btn = document.getElementById('settings-btn');
  if (!dd.contains(e.target) && e.target !== btn) dd.classList.remove('open');
});
document.getElementById('change-key-btn').addEventListener('click', () => {
  localStorage.removeItem('f1_api_key'); apiKey = '';
  document.getElementById('settings-dd').classList.remove('open');
  document.getElementById('app').style.display = 'none';
  document.getElementById('api-modal').style.display = 'flex';
  document.getElementById('api-key-input').value = '';
});
document.getElementById('clear-key-btn').addEventListener('click', () => {
  localStorage.removeItem('f1_api_key'); location.reload();
});

// ═══════════════════════════════════════════════════════════════
//  APP STARTUP
// ═══════════════════════════════════════════════════════════════
function startApp() {
  document.getElementById('api-modal').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('cam-btns').classList.add('visible');

  initThreeJS();
  buildPillBar();
  populateSidebar();
  showWelcome();

  document.getElementById('ask-btn').addEventListener('click', () => {
    const inp = document.getElementById('chat-input');
    const text = inp.value.trim();
    if (text) { inp.value = ''; sendMessage(text); }
  });
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = e.target.value.trim();
      if (text) { e.target.value = ''; sendMessage(text); }
    }
  });
  document.getElementById('new-chat-btn').addEventListener('click', newChat);
}

// API Key modal
document.getElementById('api-key-btn').addEventListener('click', () => {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) {
    document.getElementById('api-key-input').classList.add('invalid');
    setTimeout(() => document.getElementById('api-key-input').classList.remove('invalid'), 500);
    return;
  }
  apiKey = key;
  localStorage.setItem('f1_api_key', key);
  startApp();
});
document.getElementById('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('api-key-btn').click();
});

// Auto-start if key already in localStorage
if (apiKey) startApp();
</script>
